<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analysis Engine</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .metrics-grid { display: flex; gap: 20px; margin-top: 20px; }
        .metric-item { background-color: #1e293b; padding: 20px; border-radius: 10px; flex: 1; cursor: pointer; transition: transform 0.2s, background-color 0.2s; }
        .metric-item:hover { transform: translateY(-3px); background-color: #334155; }
        
        .progress-bar { 
            width: 100%; 
            background-color: #1e293b; 
            height: 20px; 
            border-radius: 10px; 
            margin-top: 15px; 
            overflow: hidden; 
            position: relative;
        }
        .progress { 
            height: 100%; 
            background: linear-gradient(90deg, #8b5cf6, #a78bfa); 
            width: 0%; 
            transition: width 0.4s ease; 
        }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <h2>AI Workspace</h2>
        <a href="index.html"><i class="fa fa-home"></i> Dashboard</a>
        <a href="tasks.html"><i class="fa fa-list"></i> Tasks</a>
        <a href="meetings.html"><i class="fa fa-calendar"></i> Meetings</a>
        <a href="analysis.html" class="active"><i class="fa fa-chart-bar"></i> Analysis</a>
    </div>
    <div class="main">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h1>Analysis Dashboard Engine</h1>
            <button id="voiceBtn" style="background-color: #8b5cf6; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                <i class="fa fa-microphone"></i> Start Voice Command
            </button>
        </div>

        <div class="card" style="width: 100%; background-color: #0f172a; border: 1px solid #1e293b;">
            <h2>Total Productivity Track</h2>
            <p id="progressPercentageText">Total Workspace Progress: 0%</p>
            <div class="progress-bar">
                <div class="progress" id="combinedProgress"></div>
            </div>
        </div>

        <div class="metrics-grid">
            <div class="metric-item">
                <h3 style="color: #cbd5e1; margin: 0 0 10px 0;">Remaining Manual Tasks</h3>
                <h1 id="taskCountDisplay" style="margin: 0; font-size: 36px; color: #8b5cf6;">0</h1>
            </div>
            <div class="metric-item">
                <h3 style="color: #cbd5e1; margin: 0 0 10px 0;">Pending Meetings Counter</h3>
                <h1 id="meetingCountDisplay" style="margin: 0; font-size: 36px; color: #8b5cf6;">0</h1>
            </div>
        </div>
    </div>
</div>

<script>
    const taskCountDisplay = document.getElementById('taskCountDisplay');
    const meetingCountDisplay = document.getElementById('meetingCountDisplay');
    const progressBar = document.getElementById('combinedProgress');
    const progressText = document.getElementById('progressPercentageText');

    function renderLiveAnalysis() {
        const tasks = JSON.parse(localStorage.getItem('globalTasks')) || [];
        const meetings = JSON.parse(localStorage.getItem('globalMeetings')) || [];
        
        const incompleteTasks = tasks.filter(t => !t.completed).length;
        const incompleteMeetings = meetings.filter(m => !m.completed).length;
        
        taskCountDisplay.textContent = incompleteTasks;
        meetingCountDisplay.textContent = incompleteMeetings;

        const totalItems = tasks.length + meetings.length;
        
        const completedTasks = tasks.filter(t => t.completed).length;
        const completedMeetings = meetings.filter(m => m.completed).length;
        const totalCompletedItems = completedTasks + completedMeetings;

        const rate = totalItems > 0 ? Math.round((totalCompletedItems / totalItems) * 100) : 0;
        
        progressBar.style.width = rate + "%";
        progressText.textContent = "Total Workspace Progress: " + rate + "% (Done: " + totalCompletedItems + " / Total: " + totalItems + ")";
    }

    window.addEventListener('load', renderLiveAnalysis);
    renderLiveAnalysis();
</script>
<script src="voice.js"></script>
</body>
</html>
