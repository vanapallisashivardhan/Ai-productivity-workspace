<!DOCTYPE html>
<html>
<head>
    <title>Tasks</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="container">
    <div class="sidebar">
        <h2>AI Workspace</h2>
        <a href="index.html">
            <i class="fa fa-home"></i> Dashboard </a>
        <a href="tasks.html">
            <i class="fa fa-list"></i> Tasks </a>
        <a href="meetings.html">
            <i class="fa fa-calendar"></i> Meetings </a>
        <a href="analytics.html">
            <i class="fa fa-chart-bar"></i> Analytics </a>
        <a href="settings.html">
            <i class="fa fa-gear"></i> Settings </a>
    </div>
    <div class="main">
        <div class="task-box">
            <h1>Tasks</h1>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
    <button id="voiceBtn" style="background-color: #8b5cf6; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px;">
        <i class="fa fa-microphone"></i> Start Voice Command
    </button>
</div>
            <input type="text" id="taskinput" placeholder="Task Name" style="width: 40%; padding: 10px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #f7f5f5; color: black;"> 
           
            <button id="addtaskbutton" style="background-color: #8b5cf6; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;">Add Task</button>
            
            <ul id="tasklist" style="list-style-type: none; padding: 0; margin-top: 20px;">
                </ul>
 <script>
    const taskinput = document.getElementById('taskinput');
    const addtaskbutton = document.getElementById('addtaskbutton');
    const tasklist = document.getElementById('tasklist');

    // Shared global array logic layer
    let tasksArray = JSON.parse(localStorage.getItem('globalTasks')) || [];

    function saveAndRenderTasks() {
        // Read the absolute up-to-date state from storage before rendering updates
        tasksArray = JSON.parse(localStorage.getItem('globalTasks')) || [];
        
        tasklist.innerHTML = "";
        
        tasksArray.forEach(function(task, index) {
            const newLi = document.createElement('li');
            newLi.style.backgroundColor = "#1e293b";
            newLi.style.padding = "15px";
            newLi.style.marginBottom = "10px";
            newLi.style.borderRadius = "8px";
            newLi.style.display = "flex";
            newLi.style.justifyContent = "space-between";
            newLi.style.alignItems = "center";

            const taskspan = document.createElement('span');
            taskspan.textContent = task.name;
            taskspan.style.cursor = "pointer";
            
            if (task.completed) {
                taskspan.style.textDecoration = "line-through";
                taskspan.style.color = "#64748b";
            } else {
                taskspan.style.color = "white";
            }

            taskspan.addEventListener('click', function() {
                tasksArray[index].completed = !tasksArray[index].completed;
                localStorage.setItem('globalTasks', JSON.stringify(tasksArray));
                saveAndRenderTasks();
            });

            const deletetaskbutton = document.createElement('button');
            deletetaskbutton.textContent = 'Delete'; 
            deletetaskbutton.style.backgroundColor = 'red';   
            deletetaskbutton.style.color = 'white';           
            deletetaskbutton.style.border = 'none';           
            deletetaskbutton.style.padding = '5px 10px';      
            deletetaskbutton.style.borderRadius = '4px';      
            deletetaskbutton.style.cursor = 'pointer';        

            deletetaskbutton.addEventListener('click', function() {
                tasksArray.splice(index, 1);
                localStorage.setItem('globalTasks', JSON.stringify(tasksArray));
                saveAndRenderTasks();
            });

            newLi.appendChild(taskspan);
            newLi.appendChild(deletetaskbutton);
            tasklist.appendChild(newLi);
        });
    }

    addtaskbutton.addEventListener('click', function() {
        if (taskinput.value.trim() === "") return;
        // Reload storage state to safely append row without data collisions
        tasksArray = JSON.parse(localStorage.getItem('globalTasks')) || [];
        tasksArray.push({ name: taskinput.value.trim(), completed: false });
        localStorage.setItem('globalTasks', JSON.stringify(tasksArray));
        taskinput.value = '';
        saveAndRenderTasks();
    });

    saveAndRenderTasks();
</script>
<script src="settings.js"></script>
<script src="voice.js"></script>
     
</body>
</html>
