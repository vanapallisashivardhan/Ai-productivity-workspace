<!DOCTYPE html>
<html>
<head>
    <title>Tasks</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="container">
    <div class="sidebar">
        <h2>AI Workspace</h2>
        <a href="index.html"><i class="fa fa-home"></i> Dashboard</a>
        <a href="tasks.html" class="active"><i class="fa fa-list"></i> Tasks</a>
        <a href="meetings.html"><i class="fa fa-calendar"></i> Meetings</a>
        <a href="analysis.html"><i class="fa fa-chart-bar"></i> Analysis</a>
    </div>
    <div class="main">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h1>Tasks Workspace</h1>
            <button id="voiceBtn" style="background-color: #8b5cf6; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                <i class="fa fa-microphone"></i> Start Voice Command
            </button>
        </div>
        
        <div style="display: flex; gap: 15px; margin-bottom: 30px;">
            <input type="text" id="taskInput" placeholder="Write down a manual task checkpoint..." style="flex: 1;">
            <button id="addTaskBtn" style="background-color: #8b5cf6; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer;">Add Task</button>
        </div>

        <div style="display: flex; gap: 30px; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 300px;">
                <h3 style="color: #a78bfa; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 8px;">Active Operational Tasks</h3>
                <ul id="taskList" style="list-style: none; padding: 0;"></ul>
            </div>
            <div style="flex: 1; min-width: 300px;">
                <h3 style="color: #10b981; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 8px;">Completed Records</h3>
                <ul id="completedTaskList" style="list-style: none; padding: 0; opacity: 0.7;"></ul>
            </div>
        </div>
    </div>
</div>

<script>
    const taskinput = document.getElementById('taskInput');
    const addtaskbutton = document.getElementById('addTaskBtn');
    const tasklist = document.getElementById('taskList');
    const completedTaskList = document.getElementById('completedTaskList');

    let tasksArray = JSON.parse(localStorage.getItem('globalTasks')) || [];

    function internalMetricSync() {
        const tasks = JSON.parse(localStorage.getItem('globalTasks')) || [];
        const meetings = JSON.parse(localStorage.getItem('globalMeetings')) || [];
        
        const incompleteTasks = tasks.filter(t => !t.completed).length;
        const incompleteMeetings = meetings.filter(m => !m.completed).length;
        
        const totalItems = tasks.length + meetings.length;
        const completedItems = tasks.filter(t => t.completed).length + meetings.filter(m => m.completed).length;
        const rate = totalItems > 0 ? Math.round((completedItems / totalItems) * 100) : 0;
        
        const todayStr = new Date().toISOString().split('T')[0];
        const historyDb = JSON.parse(localStorage.getItem('analysisHistory')) || {};
        historyDb[todayStr] = {
            incompleteTasks: incompleteTasks,
            incompleteMeetings: incompleteMeetings,
            rate: rate
        };
        localStorage.setItem('analysisHistory', JSON.stringify(historyDb));
    }

    function saveAndRenderTasks() {
        tasklist.innerHTML = '';
        completedTaskList.innerHTML = '';
        tasksArray = JSON.parse(localStorage.getItem('globalTasks')) || [];

        tasksArray.forEach((task, index) => {
            const newLi = document.createElement('li');
            newLi.className = 'card task-box';
            newLi.style.cssText = 'display: flex; justify-content: space-between; align-items: center; width: 100%; box-sizing: border-box; margin-bottom: 12px; background-color: #1e293b;';

            const leftWrapper = document.createElement('div');
            leftWrapper.style.cssText = 'display: flex; align-items: center; gap: 15px;';

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = task.completed;
            checkbox.style.cssText = 'width: 18px; height: 18px; cursor: pointer;';
            
            checkbox.addEventListener('change', function() {
                tasksArray[index].completed = checkbox.checked;
                localStorage.setItem('globalTasks', JSON.stringify(tasksArray));
                internalMetricSync();
                saveAndRenderTasks();
                if (typeof renderLiveAnalysis === 'function') renderLiveAnalysis();
            });

            const textSpan = document.createElement('span');
            textSpan.textContent = task.name;
            textSpan.style.fontSize = '16px';
            if (task.completed) {
                textSpan.style.textDecoration = 'line-through';
                textSpan.style.color = '#64748b';
            }

            leftWrapper.appendChild(checkbox);
            leftWrapper.appendChild(textSpan);

            const deletetaskbutton = document.createElement('button');
            deletetaskbutton.textContent = 'Delete'; 
            deletetaskbutton.style.cssText = 'background-color: red; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;';

            deletetaskbutton.addEventListener('click', function() {
                tasksArray.splice(index, 1);
                localStorage.setItem('globalTasks', JSON.stringify(tasksArray));
                internalMetricSync();
                saveAndRenderTasks();
            });

            newLi.appendChild(leftWrapper);
            newLi.appendChild(deletetaskbutton);

            if (!task.completed) {
                tasklist.appendChild(newLi);
            } else {
                completedTaskList.appendChild(newLi);
            }
        });
    }

    addtaskbutton.addEventListener('click', function() {
        if (taskinput.value.trim() === "") return;
        tasksArray = JSON.parse(localStorage.getItem('globalTasks')) || [];
        tasksArray.push({ name: taskinput.value.trim(), completed: false });
        localStorage.setItem('globalTasks', JSON.stringify(tasksArray));
        taskinput.value = '';
        internalMetricSync();
        saveAndRenderTasks();
    });

    saveAndRenderTasks();
</script>
<script src="voice.js"></script>
</body>
</html>
