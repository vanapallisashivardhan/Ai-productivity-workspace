<!DOCTYPE html>
<html>

<head>

    <title>Meetings</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <h2>AI Workspace</h2>

        <a href="index.html">
            <i class="fa fa-home"></i> Dashboard
        </a>

        <a href="tasks.html">
            <i class="fa fa-list"></i> Tasks
        </a>

        <a href="meetings.html">
            <i class="fa fa-calendar"></i> Meetings
        </a>

        <a href="analytics.html">
            <i class="fa fa-chart-bar"></i> Analytics
        </a>

        <a href="settings.html">
            <i class="fa fa-gear"></i> Settings
        </a>

    </div>

    <!-- MAIN -->

    <div class="main">

        <h1>Meetings</h1>

        <!-- INPUTS -->

        <input 
            type="text"
            id="meetinginput"
            placeholder="Enter Meeting Name"
            style="
                width:40%;
                padding:10px;
                border-radius:8px;
                border:none;
                margin-bottom:15px;
            "
        >

        <input 
            type="text"
            id="meetingtime"
            placeholder="Enter Meeting Time"
            style="
                width:40%;
                padding:10px;
                border-radius:8px;
                border:none;
                margin-left:10px;
                margin-bottom:15px;
            "
        >

        <!-- BUTTON -->

        <button 
            id="addmeetingbutton"
            style="
                background-color:#8b5cf6;
                color:white;
                border:none;
                padding:10px 20px;
                border-radius:8px;
                cursor:pointer;
                font-weight:bold;
            "
        >
            Add Meeting
        </button>

        <!-- LIST -->

        <ul 
            id="meetinglist"
            style="
                list-style:none;
                padding:0;
                margin-top:30px;
            "
        >

        </ul>

    </div>

</div>

<!-- JAVASCRIPT -->

<script>

    // SELECTING HTML ELEMENTS

    const meetinginput = document.getElementById("meetinginput");

    const meetingtime = document.getElementById("meetingtime");

    const addmeetingbutton = document.getElementById("addmeetingbutton");

    const meetinglist = document.getElementById("meetinglist");



    // BUTTON CLICK EVENT

    addmeetingbutton.addEventListener("click", function () {

        // GET INPUT VALUES

        const meetingText = meetinginput.value.trim();

        const meetingTimeText = meetingtime.value.trim();



        // VALIDATION

        if (meetingText === "" || meetingTimeText === "") {

            alert("Please enter meeting name and time");

            return;
        }



        // CREATE LIST ITEM

        const newLi = document.createElement("li");



        // STYLING FOR LIST ITEM

        newLi.style.display = "flex";

        newLi.style.justifyContent = "space-between";

        newLi.style.alignItems = "center";

        newLi.style.backgroundColor = "#1e293b";

        newLi.style.padding = "15px";

        newLi.style.marginBottom = "10px";

        newLi.style.borderRadius = "8px";



        // CREATE TEXT

        const meetingDetails = document.createElement("span");

        meetingDetails.textContent = meetingText + " - " + meetingTimeText;



        // CREATE DELETE BUTTON

        const deletemeetingbutton = document.createElement("button");

        deletemeetingbutton.textContent = "Delete";



        // DELETE BUTTON STYLE

        deletemeetingbutton.style.backgroundColor = "red";

        deletemeetingbutton.style.color = "white";

        deletemeetingbutton.style.border = "none";

        deletemeetingbutton.style.padding = "5px 10px";

        deletemeetingbutton.style.borderRadius = "5px";

        deletemeetingbutton.style.cursor = "pointer";



        // DELETE FUNCTION

        deletemeetingbutton.addEventListener("click", function () {

            meetinglist.removeChild(newLi);

        });



        // ADD ELEMENTS INTO LI

        newLi.appendChild(meetingDetails);

        newLi.appendChild(deletemeetingbutton);



        // ADD LI INTO UL

        meetinglist.appendChild(newLi);



        // CLEAR INPUTS

        meetinginput.value = "";

        meetingtime.value = "";

    });

</script>

</body>

</html>
