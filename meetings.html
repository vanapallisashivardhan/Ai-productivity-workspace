<!DOCTYPE html>
<html>
<head>
    <title>Meetings</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="container">
    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>AI Workspace</h2>
        <a href="index.html">
            <i class="fa fa-home"></i> Dashboard</a>
        <a href="tasks.html">
            <i class="fa fa-list"></i> Tasks</a>
        <a href="meetings.html">
            <i class="fa fa-calendar"></i> Meetings</a>
        <a href="analytics.html">
            <i class="fa fa-chart-bar"></i> Analytics</a>
        <a href="settings.html">
            <i class="fa fa-gear"></i> Settings</a>
    </div>
    <!-- MAIN -->
    <div class="main">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
    <h1>Meetings</h1>
    <button id="voiceBtn" style="background-color: #8b5cf6; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px;">
        <i class="fa fa-microphone"></i> Start Voice Command
    </button>
</div>
        <!-- INPUTS -->
        <input 
            type="text" id="meetinginput"placeholder="Enter Meeting Name" style=" width:40%; padding:10px; border-radius:8px; border:none; margin-bottom:15px;  ">
        <input  type="text" id="meetingtime" placeholder="Enter Meeting Time" style=" width:40%; padding:10px; border-radius:8px; border:none; margin-left:10px; margin-bottom:15px;   " >
        <!-- BUTTON -->
        <button  id="addmeetingbutton" style=" background-color:#8b5cf6; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold;" >
         //   Add Meeting
        </button>
        <!-- LIST -->
        <ul 
            id="meetinglist"
            style=" list-style:none;  padding:0;  margin-top:30px;"> </ul>
    </div>
</div>
<!-- JAVASCRIPT -->
<script>
    const meetinginput = document.getElementById('meetinginput');
    const meetingtime = document.getElementById('meetingtime');
    const addmeetingbutton = document.getElementById('addmeetingbutton');
    const meetinglist = document.getElementById('meetinglist');

    let meetingsArray = JSON.parse(localStorage.getItem('globalMeetings')) || [];

    function saveAndRenderMeetings() {
        // Read the absolute up-to-date state from storage before rendering updates
        meetingsArray = JSON.parse(localStorage.getItem('globalMeetings')) || [];
        
        meetinglist.innerHTML = "";

        meetingsArray.forEach(function(meet, index) {
            const newLi = document.createElement("li");
            newLi.style.backgroundColor = "#1e293b";
            newLi.style.padding = "15px";
            newLi.style.marginBottom = "10px";
            newLi.style.borderRadius = "8px";
            newLi.style.display = "flex";
            newLi.style.justifyContent = "space-between";
            newLi.style.alignItems = "center";

            const meetingDetails = document.createElement("span");
            meetingDetails.textContent = meet.name + " - " + meet.time;
            meetingDetails.style.cursor = "pointer";

            if (meet.completed) {
                meetingDetails.style.textDecoration = "line-through";
                meetingDetails.style.color = "#64748b";
            } else {
                meetingDetails.style.color = "white";
            }

            meetingDetails.addEventListener('click', function() {
                meetingsArray[index].completed = !meetingsArray[index].completed;
                localStorage.setItem('globalMeetings', JSON.stringify(meetingsArray));
                saveAndRenderMeetings();
            });

            const deletemeetingbutton = document.createElement("button");
            deletemeetingbutton.textContent = "Delete";
            deletemeetingbutton.style.backgroundColor = "red";
            deletemeetingbutton.style.color = "white";
            deletemeetingbutton.style.border = "none";
            deletemeetingbutton.style.padding = "5px 10px";
            deletemeetingbutton.style.borderRadius = "5px";
            deletemeetingbutton.style.cursor = "pointer";

            deletemeetingbutton.addEventListener("click", function () {
                meetingsArray.splice(index, 1);
                localStorage.setItem('globalMeetings', JSON.stringify(meetingsArray));
                saveAndRenderMeetings();
            });

            newLi.appendChild(meetingDetails);
            newLi.appendChild(deletemeetingbutton);
            meetinglist.appendChild(newLi);
        });
    }

    addmeetingbutton.addEventListener('click', function() {
        if (meetinginput.value.trim() === "" || meetingtime.value.trim() === "") return;
        meetingsArray = JSON.parse(localStorage.getItem('globalMeetings')) || [];
        meetingsArray.push({ name: meetinginput.value.trim(), time: meetingtime.value.trim(), completed: false });
        localStorage.setItem('globalMeetings', JSON.stringify(meetingsArray));
        meetinginput.value = "";
        meetingtime.value = "";
        saveAndRenderMeetings();
    });

    saveAndRenderMeetings();
</script>
<script src="settings.js"></script>
<script src="voice.js"></script>

</body>
</html>
